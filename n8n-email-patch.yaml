apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: preme-n8n
spec:
  template:
    metadata:
      annotations:
        traffic.sidecar.istio.io/excludeOutboundPorts: "25,587"
    spec:
      containers:
      - name: n8n
        env:
        - name: NODE_TLS_REJECT_UNAUTHORIZED
          value: "0"
