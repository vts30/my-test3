apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: preme-n8n
spec:
  template:
    spec:
      containers:
      - name: n8n
        env:
        - name: N8N_HOST
          value: "0.0.0.0"
        - name: N8N_PORT
          value: "5678"
        - name: NODE_FUNCTION_ALLOW_EXTERNAL
          value: "puppeteer-extra,puppeteer-extra-plugin-stealth,puppeteer-core,crawlee"
        envFrom:
        - secretRef:
            name: scraper-creds
      - name: task-runner
        envFrom:
        - secretRef:
            name: scraper-creds
