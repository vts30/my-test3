apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: preme-n8n
spec:
  template:
    spec:
      enableServiceLinks: false
      containers:
      - name: n8n
        env:
        - name: N8N_DIAGNOSTICS_ENABLED
          value: "false"
        envFrom:
        - secretRef:
            name: scraper-creds
      - name: task-runner
        envFrom:
        - secretRef:
            name: scraper-creds
